services:
  - type: web
    name: food-picker
    runtime: docker
    plan: free
    healthCheckPath: /
    # The app is self-contained and uses SQLite instead of an external
    # database service, so no database resource needs to be provisioned or
    # attached here. NOTE: preDeployCommand requires a paid instance type, so
    # on the free plan migrations/seeding run on container start via
    # docker/entrypoint.d instead (the image also ships pre-migrated/seeded).
    envVars:
      - key: APP_KEY
        sync: false            # paste output of `php artisan key:generate --show`
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false            # e.g. https://food-picker.onrender.com
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
